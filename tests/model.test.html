<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Model Tests - TS10 Prediction</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; }
        .pass { color: green; font-weight: bold; }
        .fail { color: red; font-weight: bold; }
        .case { margin-bottom: 0.5rem; padding: 0.5rem; background: #f9f9f9; border-radius: 4px; }
        h1 { border-bottom: 2px solid #ccc; padding-bottom: 0.5rem; }
    </style>
</head>
<body>

<h1>Model Validation Tests</h1>
<div id="results"></div>

<script src="../js/data.js"></script>
<script src="../js/model.js"></script>

<script>
    const resultsDiv = document.getElementById('results');
    let passCount = 0;
    let failCount = 0;

    function assertEqual(name, actual, expected, tolerance = 0.01) {
        const pass = Math.abs(actual - expected) <= tolerance;
        const div = document.createElement('div');
        div.className = 'case';
        if (pass) {
            passCount++;
            div.innerHTML = `<span class="pass">✔ PASS</span> <strong>${name}</strong>: ${actual}`;
        } else {
            failCount++;
            div.innerHTML = `<span class="fail">✘ FAIL</span> <strong>${name}</strong>: Expected ${expected}, got ${actual}`;
        }
        resultsDiv.appendChild(div);
    }

    // Prepare a mock data environment instead of depending on full data.js
    const oldSchoolsData = [...SCHOOLS_DATA];
    const mockSchool_TrendUp = {
        id: 9991, name: "Test Up", district: "Q1", tier: "A",
        scores: { 2022: 15, 2023: 16, 2024: 17, 2025: 18 }
    };
    const mockSchool_Gap = {
        id: 9992, name: "Test Gap", district: "Q1", tier: "A",
        scores: { 2022: 15, 2023: null, 2024: null, 2025: 18 }
    };

    // Replace data locally for tests
    window.SCHOOLS_DATA = [mockSchool_TrendUp, mockSchool_Gap, oldSchoolsData[0]]; // oldSchoolsData[0] is Tran Dai Nghia

    try {
        // --- TEST SUITE ---
        const pred_Up = PredictionModel.predictSchool(mockSchool_TrendUp);
        
        // Linear regression for [15,16,17,18] -> 2026 expected is 19.
        // WMA for [15,16,17,18] weights: [0.1, 0.2, 0.3, 0.4] -> 1.5 + 3.2 + 5.1 + 7.2 = 17.0 ??
        // Let's check model.js WMA: 0.4*2025 + 0.3*2024 + 0.2*2023 + 0.1*2022 = 0.4*18 + 0.3*17 + 0.2*16 + 0.1*15 = 7.2 + 5.1 + 3.2 + 1.5 = 17.0.
        // Expected ensemble before competition: 45% WMA (17.0 * 0.45 = 7.65) + 35% LR (19.0 * 0.35 = 6.65) / 0.8 (wait, 0.45+0.35 = 0.8) => (7.65+6.65)/0.8 = 14.3 / 0.8 = 17.875
        // Let's just check the result matches the internal math without crashing
        assertEqual("Model predicts higher score for upward trend", pred_Up.predicted > 18, true);

        // Test logistic probability function 
        // Margin = 1.5 -> Raw prob = 100 / (1 + exp(-1.15*(1.5 - 0.15))) = 100 / (1 + exp(-1.5525)) = 100 / (1 + 0.2117) = 82.5%
        const evalChoices1 = PredictionModel.evaluateChoices(20.5, [{ schoolId: 9991, priority: 1 }]);
        const margin1 = evalChoices1.choices[0].margin; 
        const prob1 = evalChoices1.choices[0].feasibilityScore;
        // Evaluate Choices
        assertEqual("Evaluate Choices returns choices array", Array.isArray(evalChoices1.choices), true);
        assertEqual("Priority 1 has no penalty", evalChoices1.choices[0].nvPenalty, 0);

        const evalChoices2 = PredictionModel.evaluateChoices(20.5, [{ schoolId: 9991, priority: 2 }]);
        assertEqual("Priority 2 has 0.75 penalty", evalChoices2.choices[0].nvPenalty, 0.75);

        const evalChoices3 = PredictionModel.evaluateChoices(20.5, [{ schoolId: 9991, priority: 3 }]);
        assertEqual("Priority 3 has 1.5 penalty", evalChoices3.choices[0].nvPenalty, 1.5);

        // Restore
        window.SCHOOLS_DATA = oldSchoolsData;
        const allPreds = PredictionModel.predictAll();
        assertEqual("predictAll() processes all schools", allPreds.length, SCHOOLS_DATA.length);

    } catch (e) {
        document.getElementById('results').innerHTML += `<div class="fail">Error running tests: ${e.message}</div>`;
        console.error(e);
    }

    // Summary
    const summary = document.createElement('h2');
    summary.innerHTML = `Test Summary: <span class="pass">${passCount} Passed</span> / <span class="fail">${failCount} Failed</span>`;
    document.body.appendChild(summary);

</script>

</body>
</html>
